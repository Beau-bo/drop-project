<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>残骸市场 - 废项局</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .project-card { transition: all 0.3s ease; }
        .project-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

<nav class="fixed top-0 w-full bg-slate-800/90 backdrop-blur-md border-b border-slate-700 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center text-slate-900 font-bold">废</div>
            <span class="font-bold text-lg text-slate-100">废项局 <span class="text-slate-400 font-normal text-sm">| Drop Project</span></span>
        </a>
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-slate-300 hover:text-slate-100 text-sm">首页</a>
            <a href="publish.html" class="bg-slate-100 text-slate-900 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-200">发布残骸</a>
            <a href="profile.html" class="w-8 h-8 bg-slate-600 rounded-full flex items-center justify-center overflow-hidden hover:ring-2 hover:ring-slate-500 transition-all">
                <img id="nav-avatar" src="" alt="" class="w-full h-full object-cover hidden">
                <span id="nav-avatar-text" class="text-slate-300 font-medium text-sm">U</span>
            </a>
        </div>
    </div>
</nav>

<main class="pt-24 pb-12 px-4 max-w-6xl mx-auto">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-slate-100 mb-2">残骸市场</h1>
        <p class="text-slate-400">浏览所有可交易的废弃项目</p>
    </div>

    <div class="flex gap-2 mb-8 overflow-x-auto pb-2">
        <button class="px-4 py-2 bg-slate-100 text-slate-900 rounded-full text-sm font-medium whitespace-nowrap">全部</button>
        <button class="px-4 py-2 bg-slate-800 border border-slate-700 text-slate-300 rounded-full text-sm whitespace-nowrap hover:border-slate-600">&lt;/&gt; 代码尸体</button>
        <button class="px-4 py-2 bg-slate-800 border border-slate-700 text-slate-300 rounded-full text-sm whitespace-nowrap hover:border-slate-600">👻 原型幽灵</button>
        <button class="px-4 py-2 bg-slate-800 border border-slate-700 text-slate-300 rounded-full text-sm whitespace-nowrap hover:border-slate-600">🎨 设计草稿</button>
        <button class="px-4 py-2 bg-slate-800 border border-slate-700 text-slate-300 rounded-full text-sm whitespace-nowrap hover:border-slate-600">🏗 运营废墟</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="project-card bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden cursor-pointer">
            <div class="h-48 bg-gradient-to-br from-slate-700 to-slate-600 flex items-center justify-center">
                <span class="text-4xl">💻</span>
            </div>
            <div class="p-5">
                <div class="flex gap-2 mb-3">
                    <span class="px-2 py-1 bg-slate-700 text-slate-300 text-xs rounded">&lt;/&gt; 代码尸体</span>
                    <span class="px-2 py-1 bg-emerald-900/50 text-emerald-400 text-xs rounded">🔥 快速激活</span>
                </div>
                <h3 class="font-bold text-slate-100 mb-2">AI客服SaaS半成品</h3>
                <p class="text-sm text-slate-400 mb-4 line-clamp-2">已完成核心对话功能，因资金问题搁置...</p>
                <div class="flex justify-between items-center pt-4 border-t border-slate-700">
                    <span class="text-xs text-slate-500">2小时前</span>
                    <span class="font-bold text-slate-100">¥500</span>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
function syncUserAvatar() {
    const profile = localStorage.getItem('userProfile');
    if (profile) {
        const data = JSON.parse(profile);
        if (data.avatar) {
            const navAvatar = document.getElementById('nav-avatar');
            const navAvatarText = document.getElementById('nav-avatar-text');
            if (navAvatar && navAvatarText) {
                navAvatar.src = data.avatar;
                navAvatar.classList.remove('hidden');
                navAvatarText.classList.add('hidden');
            }
        }
    }
}
window.onload = syncUserAvatar;
</script>

</body>
</html>
