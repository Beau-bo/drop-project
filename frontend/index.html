<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>废项局</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .project-card { transition: all 0.3s ease; }
        .project-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.5); }
        .filter-btn { transition: all 0.2s; }
        .filter-btn.active { background-color: #e2e8f0; color: #0f172a; }
        .sort-btn { transition: all 0.2s; }
        .sort-btn.active { background-color: #e2e8f0; color: #0f172a; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <h1 class="text-3xl font-bold mb-8">废项局</h1>

        <!-- 残骸类型 -->
        <div class="flex items-start gap-4 mb-5">
            <span class="text-lg text-slate-400 whitespace-nowrap mt-1.5">残骸类型：</span>
            <div class="flex gap-2 flex-wrap">
                <button class="filter-btn active px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium bg-slate-100 text-slate-900">全部</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent"><span class="text-blue-400 mr-1">&lt;/&gt;</span> 代码尸骸</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">👻 垃圾幽灵</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">🎨 设计遗稿</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">🏠 运营废墟</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">💡 概念泡沫</button>
            </div>
        </div>

        <!-- 复活难度 -->
        <div class="flex items-start gap-4 mb-5">
            <span class="text-lg text-slate-400 whitespace-nowrap mt-1.5">复活难度：</span>
            <div class="flex gap-2 flex-wrap flex-1">
                <button class="filter-btn active px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium bg-slate-100 text-slate-900">全部</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent text-yellow-500">🔥 快速激活</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent text-blue-400">🔧 局部修复</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">🏗️ 推倒重来</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">✂️ 仅供参考</button>
            </div>
        </div>

        <!-- 排序方式 -->
        <div class="flex items-start gap-4 mb-8">
            <span class="text-lg text-slate-400 whitespace-nowrap mt-1.5">排序方式：</span>
            <div class="flex gap-2 flex-wrap">
                <button class="sort-btn active px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium bg-slate-100 text-slate-900">最新发布</button>
                <button class="sort-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">最多浏览</button>
                <button class="sort-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">价格最低</button>
            </div>
        </div>

        <!-- 项目列表 -->
        <div id="project-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 项目卡片会在这里动态生成 -->
        </div>
    </div>

    <script>
        let activeType = "全部";
        let activeDifficulty = "全部";
        let currentSort = "最新发布";

        const filterButtons = document.querySelectorAll(".filter-btn");
        filterButtons.forEach(btn => {
            btn.addEventListener("click", function(e) {
                const clicked = e.currentTarget;
                const parentDiv = clicked.closest("div");
                const type = parentDiv.previousElementSibling.textContent.trim();

                parentDiv.querySelectorAll(".filter-btn").forEach(b => {
                    b.classList.remove("active", "bg-slate-100", "text-slate-900");
                    b.classList.add("bg-transparent", "text-slate-400");
                });
                clicked.classList.remove("bg-transparent", "text-slate-400");
                clicked.classList.add("active", "bg-slate-100", "text-slate-900");

                if (type === "残骸类型：") {
                    activeType = clicked.textContent.trim();
                } else if (type === "复活难度：") {
                    activeDifficulty = clicked.textContent.trim();
                }
            });
        });

        const sortButtons = document.querySelectorAll(".sort-btn");
        sortButtons.forEach(btn => {
            btn.addEventListener("click", function(e) {
                const clicked = e.currentTarget;
                sortButtons.forEach(b => {
                    b.classList.remove("active", "bg-slate-100", "text-slate-900");
                    b.classList.add("bg-transparent", "text-slate-400");
                });
                clicked.classList.remove("bg-transparent", "text-slate-400");
                clicked.classList.add("active", "bg-slate-100", "text-slate-900");
                currentSort = clicked.textContent.trim();
            });
        });
    </script>
</body>
</html>
