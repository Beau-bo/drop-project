<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>废项局 Drop Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- 导航栏 -->
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-slate-200 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white font-bold">废</div>
                <span class="font-bold text-lg">废项局 <span class="text-slate-400 font-normal text-sm">| Drop Project</span></span>
            </div>
            <div class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-600">
                <a href="index.html" class="text-slate-900">首页</a>
                <a href="market.html" class="hover:text-slate-900">残骸市场</a>
                <a href="publish.html" class="hover:text-slate-900">登记残骸</a>
            </div>
            <!-- 用户区域 -->
            <div id="user-section">
                <button onclick="showLoginModal()" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-800">
                    登录 / 注册
                </button>
            </div>
        </div>
    </nav>

    <!-- 登录弹窗 -->
    <div id="login-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
            <h3 class="text-xl font-bold text-slate-900 mb-4">登录 / 注册</h3>
            <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 text-red-600 rounded-lg text-sm"></div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">用户名</label>
                    <input type="text" id="username" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 outline-none" placeholder="输入用户名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">密码</label>
                    <input type="password" id="password" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 outline-none" placeholder="输入密码">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeLoginModal()" class="flex-1 px-4 py-2 border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-50">取消</button>
                <button onclick="handleLogin()" class="flex-1 px-4 py-2 bg-sky-600 text-white rounded-lg hover:bg-sky-700">登录</button>
                <button onclick="handleRegister()" class="flex-1 px-4 py-2 bg-slate-900 text-white rounded-lg hover:bg-slate-800">注册</button>
            </div>
        </div>
    </div>

    <!-- 首页内容 -->
    <section class="hero-bg pt-32 pb-20 px-4 text-white">
        <div class="max-w-4xl mx-auto text-center">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/10 border border-white/20 text-sm mb-6">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                已拯救 128 个搁浅项目
            </div>
            <h1 class="text-5xl md:text-6xl font-bold mb-6 tracking-tight">
                废料有价<br>
                <span class="text-slate-400">残骸新生</span>
            </h1>
            <p class="text-xl text-slate-400 mb-10 max-w-2xl mx-auto">
                让搁浅的项目，重新找到价值。我们专注展示与交易未完成的产品、创业失败的代码、放弃运营的平台。
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="publish.html" class="bg-white text-slate-900 px-8 py-4 rounded-xl font-semibold hover:bg-slate-100 transition-all flex items-center justify-center gap-2">
                    登记你的残骸
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                    </svg>
                </a>
                <a href="market.html" class="bg-white/10 text-white border border-white/20 px-8 py-4 rounded-xl font-semibold hover:bg-white/20 transition-all">
                    浏览残骸市场
                </a>
            </div>
        </div>
    </section>

    <script>
        const API_BASE = "https://drop-project.onrender.com/api";

        // 页面加载完成后检查登录状态
        window.onload = function() {
            console.log("页面加载完成，检查登录状态...");
            updateUserUI();
        };

        // 更新用户UI
        function updateUserUI() {
            const userStr = localStorage.getItem('user');
            const token = localStorage.getItem('token');
            const userSection = document.getElementById('user-section');
            
            console.log("user:", userStr);
            console.log("token:", token ? "存在" : "不存在");
            
            if (userStr && token && userSection) {
                try {
                    const userData = JSON.parse(userStr);
                    console.log("登录状态：已登录，用户名:", userData.username);
                    
                    userSection.innerHTML = `
                        <div class="flex items-center gap-3">
                            <a href="profile.html" class="text-slate-700 font-medium hover:text-sky-600">👤 ${userData.username}</a>
                            <button onclick="logout()" class="text-sm text-slate-500 hover:text-red-600">退出</button>
                        </div>
                    `;
                } catch(e) {
                    console.error("解析用户信息失败:", e);
                }
            } else {
                console.log("登录状态：未登录");
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            location.reload();
        }

        function showLoginModal() {
            document.getElementById('login-modal').classList.remove('hidden');
            document.getElementById('login-modal').classList.add('flex');
            document.getElementById('error-msg').classList.add('hidden');
        }

        function closeLoginModal() {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('login-modal').classList.remove('flex');
        }

        function showError(msg) {
            const errorEl = document.getElementById('error-msg');
            errorEl.textContent = msg;
            errorEl.classList.remove('hidden');
        }

        async function handleRegister() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('请填写用户名和密码');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '注册失败');
                }

                alert('注册成功！请登录');
                document.getElementById('password').value = '';
            } catch (error) {
                showError(error.message);
            }
        }

        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('请填写用户名和密码');
                return;
            }

            try {
                console.log("正在登录...");
                const response = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '登录失败');
                }

                console.log("登录成功，保存用户信息:", data);
                
                // 保存到 localStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                alert('登录成功！');
                closeLoginModal();
                
                // 立即更新UI
                console.log("更新UI...");
                updateUserUI();
                
            } catch (error) {
                console.error("登录失败:", error);
                showError(error.message);
            }
        }

        // 点击遮罩关闭
        document.getElementById('login-modal').addEventListener('click', function(e) {
            if (e.target === this) closeLoginModal();
        });
    </script>

</body>
</html>
