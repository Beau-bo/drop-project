<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>废项局 - </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .project-card { 
            transition: all 0.3s ease;
        }
        .project-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.5); 
        }
        .filter-btn {
            transition: all 0.2s;
        }
        .filter-btn.active {
            background-color: #e2e8f0;
            color: #0f172a;
        }
        .page-btn {
            transition: all 0.2s;
        }
        .page-btn.active {
            background-color: #e2e8f0;
            color: #0f172a;
        }
        .page-btn:hover:not(.active) {
            background-color: #334155;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

<!-- 导航栏 - 深色，删除残骸市场按钮 -->
<nav class="bg-slate-800 border-b border-slate-700/95 backdrop-blur-md border-b border-slate-800 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center text-slate-900 font-bold">废</div>
            <span class="font-bold text-lg text-slate-100">废项局 <span class="text-slate-400 font-normal text-sm">| Drop Project</span></span>
        </a>
        <div class="flex items-center gap-4">
            <a href="publish.html" class="bg-slate-100 text-slate-900 px-5 py-2 rounded-lg text-sm font-medium hover:bg-slate-200 transition-colors">发布残骸</a>
            <a href="profile.html" class="w-9 h-9 bg-slate-700 rounded-full flex items-center justify-center overflow-hidden hover:ring-2 hover:ring-slate-500 transition-all border border-slate-600">
                <img id="nav-avatar" src="" alt="" class="w-full h-full object-cover hidden">
                <span id="nav-avatar-text" class="text-slate-300 font-medium text-sm">U</span>
            </a>
        </div>
    </div>
</nav>

<!-- Hero 区域 - 深色 -->
<div class="bg-slate-900 border-b border-slate-800 pt-16 pb-12">
    <div class="max-w-6xl mx-auto px-4 text-center">
        <h1 class="text-4xl md:text-5xl font-bold text-slate-100 mb-6 tracking-tight"></h1>
        
        <p class="text-2xl md:text-4xl font-bold text-slate-100 mb-6 max-w-2xl mx-auto leading-relaxed">
            让搁浅的项目，重新找到价值。
        </p>
        <p class="text-lg text-slate-400 max-w-2xl mx-auto leading-relaxed">
            我们专注展示并交易未开发完成的产品、创业失败的项目、放弃运营的平台等。
        </p>
    </div>
</div>

<!-- 主内容区域 -->
<main class="pb-12 px-4 max-w-6xl mx-auto">
    
    <!-- 筛选器区域 - 深色卡片 -->
    <div class="project-card bg-slate-800 rounded-xl border border-slate-700 p-6 mb-6 mt-8 shadow-xl">
        <!-- 残骸类型 -->
        <div class="flex items-start gap-4 mb-5">
            <span class="text-lg text-slate-400 whitespace-nowrap mt-1.5">残骸类型：</span>
            <div class="flex gap-2 flex-wrap">
                <button class="filter-btn active px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium bg-slate-100 text-slate-900">全部</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent"><span class="text-blue-400 mr-1">&lt;/&gt;</span> 代码尸骸</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">👻 原型幽灵</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">🎨 设计遗稿</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">🏠 运营废墟</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">💡 概念泡沫</button>
            </div>
        </div>

        <!-- 复活难度 -->
        <div class="flex items-start gap-4">
            <span class="text-lg text-slate-400 whitespace-nowrap mt-1.5">复活难度：</span>
            <div class="flex gap-2 flex-wrap flex-1">
                <button class="filter-btn active px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium bg-slate-100 text-slate-900">全部</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent text-yellow-500">🔥 快速激活</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent text-blue-400">🔧 局部修复</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">推倒重来</button>
                <button class="filter-btn px-4 py-1.5 border border-slate-600 rounded-full text-sm font-medium text-slate-400 hover:border-slate-500 bg-transparent">✂️ 仅供参考</button>
