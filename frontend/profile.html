<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 废项局</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 2px solid #000; font-weight: 600; color: #111; }
        .filter-active { background-color: #1e293b; color: white; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .status-pending { background-color: #fef3c7; color: #d97706; }
        .status-draft { background: #f3f4f6; color: #6b7280; }
        .status-approved { background: #dcfce7; color: #16a34a; }
        .status-rejected { background: #fee2e2; color: #dc2626; }
        /* 头像弹窗样式 */
        .avatar-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .avatar-modal-content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
        }
        .avatar-category {
            margin-bottom: 16px;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 8px;
        }
        .avatar-item {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .avatar-item:hover {
            transform: scale(1.05);
            border-color: #94a3b8;
        }
        .avatar-item.selected {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航（移除叉号，保留Logo+用户名+退出） -->
    <div class="bg-white p-4 flex items-center justify-between shadow-sm sticky top-0 z-10">
        <a href="index.html" class="text-xl font-bold cursor-pointer">废项局</a>
        <div class="flex items-center gap-2">
            <span class="text-gray-700" id="show-username">加载中...</span>
            <button class="text-gray-500" onclick="logout()">退出</button>
        </div>
    </div>

    <!-- 用户信息卡片 -->
    <div class="bg-white m-4 p-4 rounded-lg shadow-sm">
        <div class="flex items-center gap-4 mb-4">
            <!-- 可点击的头像 -->
            <div class="w-16 h-16 bg-gray-900 rounded-full flex items-center justify-center text-white text-2xl font-bold cursor-pointer" id="user-avatar" onclick="openAvatarModal()">U</div>
            <div>
                <h2 class="text-2xl font-bold" id="user-name">用户名</h2>
                <p class="text-gray-500">加入时间：2026/03/11</p>
            </div>
        </div>
        <div class="flex justify-between text-center">
            <div>
                <div class="text-2xl font-bold text-blue-600" id="count-publish">0</div>
                <div class="text-gray-500">发布的项目</div>
            </div>
            <div>
                <div class="text-2xl font-bold text-blue-600" id="count-intent">0</div>
                <div class="text-gray-500">收到的意向</div>
            </div>
            <div>
                <div class="text-2xl font-bold text-blue-600" id="count-view">0</div>
                <div class="text-gray-500">总浏览量</div>
            </div>
        </div>
    </div>

    <!-- 标签栏 -->
    <div class="bg-white mx-4 rounded-t-lg flex border-b">
        <div class="tab flex-1 text-center py-3 tab-active" data-tab="my-publish">我的发布</div>
        <div class="tab flex-1 text-center py-3 text-gray-500" data-tab="my-intent">我的意向</div>
        <div class="tab flex-1 text-center py-3 text-gray-500" data-tab="received-intent">收到的意向</div>
        <div class="tab flex-1 text-center py-3 text-gray-500" data-tab="account-setting">账号设置</div>
    </div>

    <!-- 内容区域 -->
    <div class="bg-white mx-4 rounded-b-lg p-4 min-h-[400px]">
        <!-- 我的发布 -->
        <div id="my-publish" class="tab-content">
            <div class="flex gap-2 mb-4 overflow-x-auto">
                <div class="filter px-3 py-1 rounded-full text-sm filter-active" data-filter="all">全部</div>
                <div class="filter px-3 py-1 rounded-full text-sm bg-gray-100" data-filter="draft">草稿</div>
                <div class="filter px-3 py-1 rounded-full text-sm bg-gray-100" data-filter="pending">审核中</div>
                <div class="filter px-3 py-1 rounded-full text-sm bg-gray-100" data-filter="approved">已通过</div>
                <div class="filter px-3 py-1 rounded-full text-sm bg-gray-100" data-filter="rejected">已拒绝</div>
            </div>
            <div id="project-list" class="space-y-3"></div>
            <div id="empty-hint" class="text-center text-gray-500 py-10">
                <p>暂无项目</p>
                <a href="publish.html" class="text-blue-600 block mt-2">去发布 →</a>
            </div>
        </div>

        <!-- 我的意向 -->
        <div id="my-intent" class="tab-content hidden">
            <div class="text-center text-gray-500 py-10">暂无内容</div>
        </div>

        <!-- 收到的意向 -->
        <div id="received-intent" class="tab-content hidden">
            <div class="text-center text-gray-500 py-10">暂无收到的意向</div>
        </div>

        <!-- 账号设置 -->
        <div id="account-setting" class="tab-content hidden">
            <div class="space-y-4">
                <div>
                    <label class="text-gray-700 block mb-1">用户名</label>
                    <input type="text" id="set-username" disabled class="w-full p-2 border rounded bg-gray-50">
                </div>
                <div>
                    <label class="text-gray-700 block mb-1">新密码</label>
                    <input type="password" id="set-pwd1" placeholder="留空不修改" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="text-gray-700 block mb-1">确认新密码</label>
                    <input type="password" id="set-pwd2" placeholder="再次输入" class="w-full p-2 border rounded">
                </div>
                <button onclick="saveProfile()" class="w-full bg-gray-900 text-white py-2 rounded mt-4">保存修改</button>
            </div>
        </div>
    </div>

    <!-- 头像选择弹窗 -->
    <div class="avatar-modal" id="avatarModal">
        <div class="avatar-modal-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">选择专属头像</h3>
                <button onclick="closeAvatarModal()" class="text-gray-500 text-xl">×</button>
            </div>

            <!-- 代码人头像分类 -->
            <div class="avatar-category">
                <h4 class="font-medium text-gray-800">💻 代码人</h4>
                <div class="avatar-grid" id="coderAvatars">
                    <div class="avatar-item bg-slate-800 text-white" data-avatar="💻">💻</div>
                    <div class="avatar-item bg-indigo-600 text-white" data-avatar="🔧">🔧</div>
                    <div class="avatar-item bg-emerald-600 text-white" data-avatar="🐍">🐍</div>
                    <div class="avatar-item bg-red-600 text-white" data-avatar="⚛️">⚛️</div>
                </div>
            </div>

            <!-- 产品人头像分类 -->
            <div class="avatar-category">
                <h4 class="font-medium text-gray-800">🎯 产品人</h4>
                <div class="avatar-grid" id="productAvatars">
                    <div class="avatar-item bg-blue-600 text-white" data-avatar="🎯">🎯</div>
                    <div class="avatar-item bg-purple-600 text-white" data-avatar="📱">📱</div>
                    <div class="avatar-item bg-amber-600 text-white" data-avatar="📈">📈</div>
                    <div class="avatar-item bg-teal-600 text-white" data-avatar="🧩">🧩</div>
                </div>
            </div>

            <!-- 创业人头像分类 -->
            <div class="avatar-category">
                <h4 class="font-medium text-gray-800">🚀 创业人</h4>
                <div class="avatar-grid" id="entrepreneurAvatars">
                    <div class="avatar-item bg-rose-600 text-white" data-avatar="🚀">🚀</div>
                    <div class="avatar-item bg-cyan-600 text-white" data-avatar="💡">💡</div>
                    <div class="avatar-item bg-orange-600 text-white" data-avatar="💰">💰</div>
                    <div class="avatar-item bg-lime-600 text-white" data-avatar="🌱">🌱</div>
                </div>
            </div>

            <button onclick="confirmAvatarChange()" class="w-full bg-slate-900 text-white py-2 rounded mt-4">确认更换</button>
        </div>
    </div>

<script>
let currentFilter = "all";
let currentUser = null; // 存储当前登录用户
let selectedAvatar = null; // 选中的头像

// 头像数据
const avatarMap = {
    "💻": { bg: "bg-slate-800", text: "text-white" },
    "🔧": { bg: "bg-indigo-600", text: "text-white" },
    "🐍": { bg: "bg-emerald-600", text: "text-white" },
    "⚛️": { bg: "bg-red-600", text: "text-white" },
    "🎯": { bg: "bg-blue-600", text: "text-white" },
    "📱": { bg: "bg-purple-600", text: "text-white" },
    "📈": { bg: "bg-amber-600", text: "text-white" },
    "🧩": { bg: "bg-teal-600", text: "text-white" },
    "🚀": { bg: "bg-rose-600", text: "text-white" },
    "💡": { bg: "bg-cyan-600", text: "text-white" },
    "💰": { bg: "bg-orange-600", text: "text-white" },
    "🌱": { bg: "bg-lime-600", text: "text-white" }
};

window.onload = function () {
    // 先检查登录状态，未登录直接跳首页
    if (!checkLogin()) return;
    // 加载当前用户信息
    loadUserInfo();
    // 加载用户头像
    loadUserAvatar();
    // 渲染当前用户的项目（仅显示自己的）
    renderProjects();
    // 绑定标签/筛选事件
    bindEvents();
    // 绑定头像选择事件
    bindAvatarEvents();
    // 更新统计数字
    refreshCount();
};

// 检查登录状态，返回当前用户
function checkLogin() {
    const userStr = localStorage.getItem('user');
    if (!userStr) {
        alert('请先登录！');
        location.href = 'index.html';
        return false;
    }
    currentUser = JSON.parse(userStr);
    return true;
}

// 加载当前登录用户的信息
function loadUserInfo() {
    if (!currentUser) return;
    // 显示用户名
    document.getElementById('show-username').innerText = currentUser.username;
    document.getElementById('user-name').innerText = currentUser.username;
    // 账号设置里的用户名
    document.getElementById('set-username').value = currentUser.username;
}

// 加载用户头像
function loadUserAvatar() {
    const avatarEl = document.getElementById('user-avatar');
    // 读取保存的头像，没有则用用户名首字母
    const savedAvatar = localStorage.getItem(`avatar_${currentUser.username}`);
    if (savedAvatar && avatarMap[savedAvatar]) {
        avatarEl.innerText = savedAvatar;
        avatarEl.className = `w-16 h-16 rounded-full flex items-center justify-center text-white text-2xl font-bold cursor-pointer ${avatarMap[savedAvatar].bg}`;
    } else {
        // 默认头像（用户名首字母）
        const firstChar = currentUser.username.substring(0, 1).toUpperCase();
        avatarEl.innerText = firstChar;
        avatarEl.className = 'w-16 h-16 bg-gray-900 rounded-full flex items-center justify-center text-white text-2xl font-bold cursor-pointer';
    }
}

// 绑定标签和筛选事件
function bindEvents() {
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
            tab.classList.add('tab-active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(tab.dataset.tab).classList.remove('hidden');
        });
    });

    document.querySelectorAll('.filter').forEach(f => {
        f.addEventListener('click', () => {
            document.querySelectorAll('.filter').forEach(x => x.classList.remove('filter-active'));
            f.classList.add('filter-active');
            currentFilter = f.dataset.filter;
            renderProjects();
        });
    });
}

// 绑定头像选择事件
function bindAvatarEvents() {
    // 给所有头像项绑定点击事件
    document.querySelectorAll('.avatar-item').forEach(item => {
        item.addEventListener('click', () => {
            // 移除所有选中状态
            document.querySelectorAll('.avatar-item').forEach(i => i.classList.remove('selected'));
            // 添加当前选中状态
            item.classList.add('selected');
            // 记录选中的头像
            selectedAvatar = item.dataset.avatar;
        });
    });
}

// 打开头像选择弹窗
function openAvatarModal() {
    document.getElementById('avatarModal').style.display = 'flex';
    // 重置选中状态
    selectedAvatar = null;
    document.querySelectorAll('.avatar-item').forEach(i => i.classList.remove('selected'));
}

// 关闭头像选择弹窗
function closeAvatarModal() {
    document.getElementById('avatarModal').style.display = 'none';
    selectedAvatar = null;
}

// 确认更换头像
function confirmAvatarChange() {
    if (!selectedAvatar) {
        alert('请选择一个头像！');
        return;
    }
    // 保存头像到本地存储（和用户名绑定）
    localStorage.setItem(`avatar_${currentUser.username}`, selectedAvatar);
    // 更新页面显示
    const avatarEl = document.getElementById('user-avatar');
    avatarEl.innerText = selectedAvatar;
    avatarEl.className = `w-16 h-16 rounded-full flex items-center justify-center text-white text-2xl font-bold cursor-pointer ${avatarMap[selectedAvatar].bg}`;
    // 关闭弹窗
    closeAvatarModal();
    alert('头像更换成功！');
}

// 渲染当前用户的项目（仅显示自己发布的）
function renderProjects() {
    const list = document.getElementById('project-list');
    const empty = document.getElementById('empty-hint');
    list.innerHTML = '';
    
    // 读取所有项目，仅筛选当前用户的
    let allProjects = JSON.parse(localStorage.getItem('allProjects') || '[]');
    let userProjects = allProjects.filter(p => p.username === currentUser.username);

    // 按筛选条件过滤
    if (currentFilter !== 'all') {
        userProjects = userProjects.filter(p => p.status === currentFilter);
    }

    // 无项目显示空提示
    if (userProjects.length === 0) {
        empty.classList.remove('hidden');
        return;
    }
    empty.classList.add('hidden');

    // 渲染项目卡片
    userProjects.forEach((p, idx) => {
        const item = document.createElement('div');
        item.className = 'border rounded-lg p-3';
        const statusCls = {
            draft: 'status-draft',
            pending: 'status-pending',
            approved: 'status-approved',
            rejected: 'status-rejected'
        }[p.status] || 'status-draft';

        const statusText = {
            draft: '草稿',
            pending: '审核中',
            approved: '已通过',
            rejected: '已拒绝'
        }[p.status] || '草稿';

        // 类型名称转换（prototype → 原型幽灵）
        const typeText = {
            code: '代码尸体',
            prototype: '原型幽灵',
            design: '设计草稿',
            operation: '运营废墟',
            concept: '概念泡沫'
        }[p.type] || '未知类型';

        item.innerHTML = `
        <div class="flex justify-between items-center mb-2">
            <div class="flex gap-2">
                <span class="text-sm bg-gray-100 px-2 py-0.5 rounded">${typeText}</span>
                <span class="status-tag ${statusCls}">${statusText}</span>
            </div>
            <span class="text-gray-500 text-xs">${p.createTime || new Date().toLocaleDateString()}</span>
        </div>
        <h3 class="text-lg font-bold mb-1">${p.title}</h3>
        <p class="text-gray-500 text-sm mb-2 line-clamp-2">${p.hook || p.detail || ''}</p>
        <div class="flex justify-between items-center text-xs text-gray-500">
            <div>👁️ ${p.viewCount || 0}</div>
            <div>
                <button onclick="editProject(${idx})" class="text-blue-600 mr-3">编辑</button>
                <button onclick="deleteProject(${idx})" class="text-red-500">删除</button>
            </div>
        </div>`;
        list.appendChild(item);
    });
}

// 更新当前用户的项目统计
function refreshCount() {
    const allProjects = JSON.parse(localStorage.getItem('allProjects') || '[]');
    const userProjects = allProjects.filter(p => p.username === currentUser.username);
    document.getElementById('count-publish').innerText = userProjects.length;
}

// 编辑项目
function editProject(idx) {
    const allProjects = JSON.parse(localStorage.getItem('allProjects') || '[]');
    const userProjects = allProjects.filter(p => p.username === currentUser.username);
    localStorage.setItem('editProject', JSON.stringify(userProjects[idx]));
    localStorage.setItem('editIndex', idx);
    location.href = 'publish.html';
}

// 删除项目
function deleteProject(idx) {
    if (!confirm('确定删除该项目吗？删除后无法恢复！')) return;
    let allProjects = JSON.parse(localStorage.getItem('allProjects') || '[]');
    const userProjects = allProjects.filter(p => p.username === currentUser.username);
    // 找到要删除的项目在总列表里的索引
    const deleteId = userProjects[idx].id;
    allProjects = allProjects.filter(p => p.id !== deleteId);
    // 保存回本地存储
    localStorage.setItem('allProjects', JSON.stringify(allProjects));
    // 重新渲染
    renderProjects();
    refreshCount();
}

// 保存账号设置
function saveProfile() {
    const pwd1 = document.getElementById('set-pwd1').value;
    const pwd2 = document.getElementById('set-pwd2').value;
    if (pwd1 && pwd1 !== pwd2) {
        alert('两次密码不一致！');
        return;
    }
    alert('账号信息保存成功！');
}

// 退出登录（清空当前用户，保留所有项目）
function logout() {
    localStorage.removeItem('user');
    localStorage.removeItem('token');
    alert('退出成功！');
    location.href = 'index.html';
}
</script>
</body>
</html>
