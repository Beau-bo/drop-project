<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 废项局</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 2px solid #000; font-weight: 600; }
        .filter-active { background-color: #1e293b; color: white; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .status-pending { background-color: #fef3c7; color: #d97706; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航 -->
    <div class="bg-white p-4 flex items-center justify-between shadow-sm sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <button class="text-gray-500" onclick="history.back()">×</button>
            <span class="text-xl font-bold">废项局</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-gray-700">👤 test3</span>
            <button class="text-gray-500" onclick="logout()">退出</button>
        </div>
    </div>

    <!-- 用户信息卡片 -->
    <div class="bg-white m-4 p-4 rounded-lg shadow-sm">
        <div class="flex items-center gap-4 mb-4">
            <div class="w-16 h-16 bg-gray-900 rounded-full flex items-center justify-center text-white text-2xl font-bold">T</div>
            <div>
                <h2 class="text-2xl font-bold">test3</h2>
                <p class="text-gray-500">加入时间：2026/2/26</p>
            </div>
        </div>
        <div class="flex justify-between text-center">
            <div>
                <div class="text-2xl font-bold text-blue-600">2</div>
                <div class="text-gray-500">发布的项目</div>
            </div>
            <div>
                <div class="text-2xl font-bold text-blue-600">0</div>
                <div class="text-gray-500">收到的意向</div>
            </div>
            <div>
                <div class="text-2xl font-bold text-blue-600">423</div>
                <div class="text-gray-500">总浏览量</div>
            </div>
        </div>
    </div>

    <!-- 标签栏 -->
    <div class="bg-white mx-4 rounded-t-lg flex border-b">
        <div class="tab flex-1 text-center py-3 tab-active" data-tab="my-publish">我的发布</div>
        <div class="tab flex-1 text-center py-3 text-gray-500" data-tab="my-intent">我的意向</div>
        <div class="tab flex-1 text-center py-3 text-gray-500" data-tab="received-intent">收到的意向</div>
        <div class="tab flex-1 text-center py-3 text-gray-500" data-tab="account-setting">账号设置</div>
    </div>

    <!-- 内容区域 -->
    <div class="bg-white mx-4 rounded-b-lg p-4 min-h-[400px]">
        <!-- 我的发布 -->
        <div id="my-publish" class="tab-content">
            <div class="flex gap-2 mb-4 overflow-x-auto">
                <div class="filter px-3 py-1 rounded-full text-sm text-gray-500 bg-gray-100" data-filter="all">全部</div>
                <div class="filter px-3 py-1 rounded-full text-sm filter-active" data-filter="draft">草稿</div>
                <div class="filter px-3 py-1 rounded-full text-sm text-gray-500 bg-gray-100" data-filter="pending">审核中</div>
                <div class="filter px-3 py-1 rounded-full text-sm text-gray-500 bg-gray-100" data-filter="approved">已通过</div>
                <div class="filter px-3 py-1 rounded-full text-sm text-gray-500 bg-gray-100" data-filter="rejected">已拒绝</div>
            </div>
            <div class="text-center text-gray-500 py-8">
                <p>暂无项目</p>
                <a href="publish.html" class="text-blue-600">去发布 →</a>
            </div>
            <!-- 示例项目卡片（和截图一致） -->
            <div class="hidden border rounded-lg p-3 mb-3">
                <div class="flex justify-between items-center mb-2">
                    <div class="flex gap-2">
                        <span class="text-sm bg-gray-100 px-2 py-0.5 rounded">代码尸骸</span>
                        <span class="status-tag status-pending">审核中</span>
                    </div>
                    <span class="text-gray-500 text-sm">2024-03-11</span>
                </div>
                <h3 class="text-lg font-bold mb-1">AI客服 SaaS 半成品</h3>
                <p class="text-gray-500 text-sm mb-2">基于 GPT-4 的智能客服系统...</p>
                <div class="flex justify-between items-center">
                    <div class="flex gap-4 text-sm text-gray-500">
                        <span>👁️ 234</span>
                        <span>✉️ 3</span>
                    </div>
                    <button class="text-blue-600 text-sm">编辑</button>
                </div>
            </div>
        </div>

        <!-- 我的意向 -->
        <div id="my-intent" class="tab-content hidden">
            <div class="text-center text-gray-500 py-8">暂无内容</div>
        </div>

        <!-- 收到的意向 -->
        <div id="received-intent" class="tab-content hidden">
            <div class="border rounded-lg p-3 mb-3">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-lg font-bold">AI客服 SaaS 半成品</h3>
                    <span class="text-gray-500 text-sm">2024-03-11</span>
                </div>
                <p class="text-gray-500 text-sm mb-1">来自：张三</p>
                <p class="text-gray-700 mb-3">很感兴趣，方便聊聊吗？</p>
                <div class="flex gap-2">
                    <button class="bg-blue-600 text-white px-4 py-1 rounded">联系对方</button>
                    <button class="border px-4 py-1 rounded">拒绝</button>
                </div>
            </div>
            <div class="border rounded-lg p-3 mb-3">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-lg font-bold">AI客服 SaaS 半成品</h3>
                    <span class="text-gray-500 text-sm">2024-03-10</span>
                </div>
                <p class="text-gray-500 text-sm mb-1">来自：李四</p>
                <p class="text-gray-700 mb-3">想了解一下价格</p>
                <div class="flex gap-2">
                    <button class="bg-blue-600 text-white px-4 py-1 rounded">联系对方</button>
                    <button class="border px-4 py-1 rounded">拒绝</button>
                </div>
            </div>
        </div>

        <!-- 账号设置 -->
        <div id="account-setting" class="tab-content hidden">
            <div class="space-y-4">
                <div>
                    <label class="text-gray-700 block mb-1">用户名</label>
                    <input type="text" value="test3" disabled class="w-full p-2 border rounded bg-gray-50">
                    <p class="text-gray-500 text-sm">用户名不可修改</p>
                </div>
                <div>
                    <label class="text-gray-700 block mb-1">新密码</label>
                    <input type="password" placeholder="留空表示不修改" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="text-gray-700 block mb-1">确认新密码</label>
                    <input type="password" placeholder="再次输入新密码" class="w-full p-2 border rounded">
                </div>
                <button class="w-full bg-gray-900 text-white py-2 rounded mt-4">保存修改</button>
            </div>
        </div>
    </div>

    <script>
        // 标签切换逻辑
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active', 'text-gray-900'));
                document.querySelectorAll('.tab').forEach(t => t.classList.add('text-gray-500'));
                tab.classList.add('tab-active', 'text-gray-900');
                tab.classList.remove('text-gray-500');
                
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(tab.dataset.tab).classList.remove('hidden');
            });
        });

        // 筛选切换逻辑
        document.querySelectorAll('.filter').forEach(filter => {
            filter.addEventListener('click', () => {
                document.querySelectorAll('.filter').forEach(f => f.classList.remove('filter-active'));
                filter.classList.add('filter-active');
            });
        });

        // 退出登录
        function logout() {
            localStorage.clear();
            location.href = 'index.html';
        }
    </script>
</body>
</html>
