<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 废项局</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

<nav class="fixed top-0 w-full bg-white shadow z-50">
  <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
    <div class="font-bold">废项局 | 个人中心</div>
    <div id="user-section"></div>
  </div>
</nav>

<main class="pt-24 px-4 max-w-4xl mx-auto pb-20">
  <h2 class="text-xl font-bold mb-4">我提交的残骸项目</h2>
  <div id="project-list" class="grid gap-4">
    <p class="text-slate-500">加载中...</p>
  </div>
</main>

<script>
const API_BASE = "https://drop-project.onrender.com/api";

// 刷新用户信息
function refreshUserUI() {
  const s = document.getElementById('user-section');
  const token = localStorage.getItem('token');
  const user = localStorage.getItem('user');

  if (!token || !user) {
    s.innerHTML = `<a href="index.html" class="text-sm">请先登录</a>`;
    return;
  }

  const u = JSON.parse(user);
  s.innerHTML = `
    <div class="text-sm flex gap-3">
      <span>👤 ${u.username}</span>
      <button onclick="logout()" class="text-red-500">退出</button>
    </div>`;
}

// 退出
function logout() {
  localStorage.clear();
  location.href = "index.html";
}

// 加载我发布的项目 ====== 核心代码 ======
async function loadMyProjects() {
  const list = document.getElementById('project-list');
  const token = localStorage.getItem('token');

  if (!token) {
    list.innerHTML = `<p>请先登录</p>`;
    return;
  }

  try {
    const res = await fetch(API_BASE + "/projects/my", {
      headers: { "Authorization": "Bearer " + token }
    });
    const projects = await res.json();

    if (projects.length === 0) {
      list.innerHTML = `<p class="text-slate-500">你还没有提交任何残骸</p>`;
      return;
    }

    list.innerHTML = projects.map(p => `
      <div class="bg-white p-4 rounded-lg shadow">
        <div class="font-bold">${p.title}</div>
        <div class="text-sm text-slate-500 mt-1">${p.hook}</div>
        <div class="mt-2 text-xs">
          <span class="px-2 py-1 bg-yellow-100 text-yellow-800 rounded">${p.status === 'pending' ? '⏳ 待审核' : '✅ 已发布'}</span>
        </div>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = `<p>加载失败</p>`;
  }
}

// 启动
window.onload = () => {
  refreshUserUI();
  loadMyProjects();
};
</script>
</body>
</html>
