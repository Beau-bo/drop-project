<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登记残骸 - 废项局</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- 提示消息 -->
    <div id="toast" class="toast"></div>

    <!-- 导航栏 -->
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-slate-200 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white font-bold">废</div>
                <span class="font-bold text-lg">废项局</span>
            </div>
            <div class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-600">
                <a href="index.html" class="hover:text-slate-900">首页</a>
                <a href="market.html" class="hover:text-slate-900">残骸市场</a>
                <a href="publish.html" class="text-slate-900">登记残骸</a>
            </div>
            <div id="user-section">
                <span class="text-slate-700 font-medium">👤 <span id="current-username">--</span></span>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="pt-24 pb-12 px-4 max-w-2xl mx-auto">
        
        <div class="bg-white rounded-2xl border border-slate-200 p-8">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-slate-900" id="page-title">登记残骸</h1>
                <a href="profile.html" class="text-sm text-sky-600 hover:text-sky-700">← 返回个人中心</a>
            </div>

            <form id="publish-form" class="space-y-6">
                <input type="hidden" id="project-id" value="">
                <input type="hidden" id="edit-mode" value="false">
                
                <!-- 项目名称 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">项目名称 *</label>
                    <input type="text" id="project-title" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 outline-none" placeholder="给你的残骸起个名字" required>
                </div>

                <!-- 项目类型 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">残骸类型 *</label>
                    <select id="project-type" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 outline-none" required>
                        <option value="">请选择类型</option>
                        <option value="代码尸骸">💀 代码尸骸 - 未完成的程序</option>
                        <option value="原型幽灵">👻 原型幽灵 - 产品原型</option>
                        <option value="设计遗稿">🎨 设计遗稿 - 设计稿/UI</option>
                        <option value="运营废墟">🚧 运营废墟 - 停运项目</option>
                        <option value="概念泡沫">🫧 概念泡沫 - 未落地创意</option>
                    </select>
                </div>

                <!-- 项目描述 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">项目描述 *</label>
                    <textarea id="project-desc" rows="4" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 outline-none" placeholder="描述一下这个项目的背景、完成度、为什么放弃..." required></textarea>
                    <p class="text-xs text-slate-500 mt-1">建议包含：技术栈、完成度、放弃原因、潜在价值</p>
                </div>

                <!-- 期望价格 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">期望价格（可选）</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-slate-500">¥</span>
                        <input type="number" id="project-price" class="w-full p-3 pl-8 rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 outline-none" placeholder="留空表示面议">
                    </div>
                </div>

                <!-- 联系方式 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">联系方式 *</label>
                    <input type="text" id="project-contact" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 outline-none" placeholder="微信 / 邮箱 / 电话" required>
                </div>

                <!-- 按钮 -->
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="saveDraft()" class="flex-1 px-6 py-3 border border-slate-300 rounded-lg text-slate-700 font-medium hover:bg-slate-50">
                        保存草稿
                    </button>
                    <button type="button" onclick="submitProject()" class="flex-1 px-6 py-3 bg-slate-900 text-white rounded-lg font-medium hover:bg-slate-800">
                        提交审核
                    </button>
                </div>
            </form>
        </div>

    </main>

    <script>
        const API_BASE = "https://drop-project.onrender.com/api";
        let currentUser = null;

        // 页面加载
        window.onload = function() {
            checkLogin();
            loadDraftForEditing();
        };

        function checkLogin() {
            const userStr = localStorage.getItem('user');
            const token = localStorage.getItem('token');
            
            if (!userStr || !token) {
                alert('请先登录');
                window.location.href = 'index.html';
                return;
            }
            
            currentUser = JSON.parse(userStr);
            document.getElementById('current-username').textContent = currentUser.username;
        }

        // 加载草稿数据（如果是编辑模式）
        function loadDraftForEditing() {
            const editingDraft = localStorage.getItem('editingDraft');
            if (!editingDraft) return;
            
            const draft = JSON.parse(editingDraft);
            document.getElementById('project-id').value = draft.id || '';
            document.getElementById('edit-mode').value = 'true';
            document.getElementById('project-title').value = draft.title || '';
            document.getElementById('project-type').value = draft.type || '';
            document.getElementById('project-desc').value = draft.description || '';
            document.getElementById('project-price').value = draft.price || '';
            document.getElementById('project-contact').value = draft.contact || '';
            
            document.getElementById('page-title').textContent = '编辑草稿';
            
            // 清除编辑标记
            localStorage.removeItem('editingDraft');
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'success' ? '#059669' : '#dc2626';
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 获取表单数据
        function getFormData() {
            return {
                id: document.getElementById('project-id').value || Date.now(),
                title: document.getElementById('project-title').value,
                type: document.getElementById('project-type').value,
                description: document.getElementById('project-desc').value,
                price: document.getElementById('project-price').value,
                contact: document.getElementById('project-contact').value,
                author: currentUser.username,
                date: new Date().toLocaleDateString('zh-CN'),
                views: 0,
                intentions: 0
            };
        }

        // 验证表单
        function validateForm() {
            const title = document.getElementById('project-title').value;
            const type = document.getElementById('project-type').value;
            const desc = document.getElementById('project-desc').value;
            const contact = document.getElementById('project-contact').value;
            
            if (!title || !type || !desc || !contact) {
                showToast('请填写必填项', 'error');
                return false;
            }
            return true;
        }

        // 保存草稿
        function saveDraft() {
            if (!validateForm()) return;
            
            const data = getFormData();
            data.status = 'draft';
            
            // 从 localStorage 读取现有草稿
            let drafts = JSON.parse(localStorage.getItem('myDrafts') || '[]');
            
            // 如果是编辑模式，替换原有草稿
            const editMode = document.getElementById('edit-mode').value === 'true';
            if (editMode) {
                drafts = drafts.filter(d => d.id != data.id);
            }
            
            // 添加新草稿
            drafts.push(data);
            localStorage.setItem('myDrafts', JSON.stringify(drafts));
            
            showToast('草稿已保存！');
            
            // 延迟跳转到个人中心
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 1500);
        }

        // 提交审核
        async function submitProject() {
            if (!validateForm()) return;
            
            const data = getFormData();
            data.status = 'pending';
            
            // 如果是编辑草稿，先删除草稿
            const editMode = document.getElementById('edit-mode').value === 'true';
            if (editMode) {
                let drafts = JSON.parse(localStorage.getItem('myDrafts') || '[]');
                drafts = drafts.filter(d => d.id != data.id);
                localStorage.setItem('myDrafts', JSON.stringify(drafts));
            }
            
            // 这里应该调用 API 提交到后端
            // const response = await fetch(API_BASE + '/projects', {...});
            
            showToast('提交成功！请等待审核');
            
            // 延迟跳转到个人中心
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 1500);
        }
    </script>

</body>
</html>
