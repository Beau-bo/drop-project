<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>残骸新生 - 发布项目</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex flex-col">
        <!-- 顶部导航 -->
        <header class="bg-white shadow">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <div class="text-xl font-bold text-gray-800">残骸新生</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <a href="index.html" class="text-gray-700 hover:text-blue-600">首页</a>
                        <a href="market.html" class="text-gray-700 hover:text-blue-600">残骸市场</a>
                        <a href="publish.html" class="text-blue-600 font-medium">发布残骸</a>
                        <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center">
                            <span class="text-gray-600">U</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主要内容 -->
        <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="bg-white rounded-lg shadow p-8">
                <h1 class="text-2xl font-bold text-gray-900 mb-2">完成登记，发布您的残骸信息</h1>
                <p class="text-gray-600 mb-6">发布后您将获得价值60元的启动资金</p>
                
                <!-- 步骤条 -->
                <div class="flex items-center justify-between mb-8">
                    <div class="flex flex-col items-center">
                        <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center">1</div>
                        <span class="text-sm mt-2">基本信息</span>
                    </div>
                    <div class="flex-1 h-1 mx-4 bg-gray-200">
                        <div class="h-full bg-blue-600 w-1/2"></div>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="w-8 h-8 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center">2</div>
                        <span class="text-sm mt-2">完成发布</span>
                    </div>
                </div>

                <!-- 发布表单 -->
                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">残骸名称 *</label>
                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入残骸项目名称">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">一句话介绍 *</label>
                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="简单描述您的项目特点">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">项目简介 *</label>
                        <textarea rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="详细介绍您的项目功能、用途、现状"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">附件上传</label>
                        <input type="file" multiple class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <p class="text-xs text-gray-500 mt-1">支持图片、文档、压缩包等格式</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">项目类型 *</label>
                        <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option>请选择项目类型</option>
                            <option>网站/网页</option>
                            <option>APP应用</option>
                            <option>小程序</option>
                            <option>桌面软件</option>
                            <option>其他</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">技术栈 *</label>
                        <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option>请选择主要技术</option>
                            <option>HTML/CSS/JS</option>
                            <option>React/Vue/Angular</option>
                            <option>Python</option>
                            <option>Java</option>
                            <option>PHP</option>
                            <option>其他</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">项目需求 *</label>
                        <textarea rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="您希望如何处理这个项目？寻找开发者接手？"></textarea>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full bg-blue-600 text-white py-3 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            提交发布
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
