<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登记残骸</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<!-- 导航栏 -->
<nav class="fixed w-full bg-white shadow p-4 flex justify-between items-center">
    <div>废项局</div>
    <div id="user-status"></div>
</nav>

<!-- 登录弹窗 -->
<div id="loginModal" class="fixed w-full h-full bg-black/50 flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded-lg">
        <h2 class="text-xl mb-4">登录</h2>
        <input id="username" class="border p-2 w-full mb-2" placeholder="用户名">
        <input id="password" type="password" class="border p-2 w-full mb-4" placeholder="密码">
        <button onclick="doLogin()" class="bg-blue-500 text-white p-2 w-full">登录</button>
    </div>
</div>

<div class="pt-24 p-4">
    <h1 class="text-2xl font-bold">发布项目</h1>
    <button onclick="document.getElementById('loginModal').classList.remove('hidden')" class="mt-4 bg-gray-800 text-white p-2">登录/注册</button>
</div>

<script>
// =============================================
// 最强刷新：每 1 秒检查一次登录状态（电脑端必生效）
// =============================================
function updateUI() {
    let userSection = document.getElementById('user-status');
    let token = localStorage.getItem('token');
    let user = localStorage.getItem('user');

    if (token && user) {
        let u = JSON.parse(user);
        userSection.innerHTML = `<span>👤 ${u.username} | <button onclick="logout()">退出</button></span>`;
    } else {
        userSection.innerHTML = `<button onclick="document.getElementById('loginModal').classList.remove('hidden')">登录/注册</button>`;
    }
}

// 每秒强制刷新
setInterval(updateUI, 500);
updateUI();

// 登录
async function doLogin() {
    let username = document.getElementById('username').value;
    let password = document.getElementById('password').value;

    localStorage.setItem('token', 'fake-token');
    localStorage.setItem('user', JSON.stringify({ username: username }));

    alert("登录成功");
    updateUI();
    document.getElementById('loginModal').classList.add('hidden');
}

// 退出
function logout() {
    localStorage.clear();
    updateUI();
}
</script>
</body>
</html>
