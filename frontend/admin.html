<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 废项局</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

<nav class="fixed top-0 w-full bg-slate-800/90 backdrop-blur-md border-b border-slate-700 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center text-slate-900 font-bold">废</div>
            <span class="font-bold text-lg text-slate-100">废项局 <span class="text-slate-400 font-normal text-sm">| Drop Project</span></span>
        </a>
        <div class="flex items-center gap-4">
            <span class="text-slate-300 text-sm">管理员</span>
            <a href="index.html" class="text-slate-300 hover:text-slate-100 text-sm">退出</a>
        </div>
    </div>
</nav>

<main class="pt-24 pb-12 px-4 max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold text-slate-100 mb-8">管理后台</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-slate-800 rounded-2xl border border-slate-700 p-6">
            <div class="text-3xl font-bold text-slate-100 mb-1">3,240</div>
            <div class="text-sm text-slate-400">总项目数</div>
        </div>
        <div class="bg-slate-800 rounded-2xl border border-slate-700 p-6">
            <div class="text-3xl font-bold text-emerald-400 mb-1">850</div>
            <div class="text-sm text-slate-400">已发布</div>
        </div>
        <div class="bg-slate-800 rounded-2xl border border-slate-700 p-6">
            <div class="text-3xl font-bold text-amber-400 mb-1">128</div>
            <div class="text-sm text-slate-400">待审核</div>
        </div>
        <div class="bg-slate-800 rounded-2xl border border-slate-700 p-6">
            <div class="text-3xl font-bold text-slate-100 mb-1">¥12.5万</div>
            <div class="text-sm text-slate-400">交易总额</div>
        </div>
    </div>

    <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-700 flex justify-between items-center">
            <h2 class="font-bold text-slate-100">待审核项目</h2>
            <span class="text-sm text-slate-400">共 128 个</span>
        </div>
        
        <div class="divide-y divide-slate-700">
            <div class="p-6 flex items-center justify-between hover:bg-slate-700/50 transition-colors">
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 bg-slate-700 rounded-lg flex items-center justify-center text-2xl">💻</div>
                    <div>
                        <h3 class="font-bold text-slate-100 mb-1">AI客服SaaS半成品</h3>
                        <p class="text-sm text-slate-400 mb-2">提交者：用户A · 2小时前</p>
                        <div class="flex gap-2">
                            <span class="px-2 py-0.5 bg-slate-700 text-slate-300 text-xs rounded">&lt;/&gt; 代码尸体</span>
                            <span class="px-2 py-0.5 bg-slate-700 text-slate-300 text-xs rounded">¥500</span>
                        </div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button class="px-4 py-2 bg-emerald-900/50 text-emerald-400 rounded-lg text-sm font-medium hover:bg-emerald-900/70">通过</button>
                    <button class="px-4 py-2 bg-red-900/50 text-red-400 rounded-lg text-sm font-medium hover:bg-red-900/70">拒绝</button>
                    <button class="px-4 py-2 bg-slate-700 text-slate-300 rounded-lg text-sm font-medium hover:bg-slate-600">查看</button>
                </div>
            </div>
            
            <div class="p-6 flex items-center justify-between hover:bg-slate-700/50 transition-colors">
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 bg-slate-700 rounded-lg flex items-center justify-center text-2xl">🎨</div>
                    <div>
                        <h3 class="font-bold text-slate-100 mb-1">电商小程序UI设计稿</h3>
                        <p class="text-sm text-slate-400 mb-2">提交者：用户B · 5小时前</p>
                        <div class="flex gap-2">
                            <span class="px-2 py-0.5 bg-slate-700 text-slate-300 text-xs rounded">🎨 设计草稿</span>
                            <span class="px-2 py-0.5 bg-slate-700 text-slate-300 text-xs rounded">免费</span>
                        </div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button class="px-4 py-2 bg-emerald-900/50 text-emerald-400 rounded-lg text-sm font-medium hover:bg-emerald-900/70">通过</button>
                    <button class="px-4 py-2 bg-red-900/50 text-red-400 rounded-lg text-sm font-medium hover:bg-red-900/70">拒绝</button>
                    <button class="px-4 py-2 bg-slate-700 text-slate-300 rounded-lg text-sm font-medium hover:bg-slate-600">查看</button>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
